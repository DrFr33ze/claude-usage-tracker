<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Usage</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 12px;
      background: #1e1e2e;
      color: #cdd6f4;
      width: 290px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid #45475a;
      user-select: none;
      -webkit-user-select: none;
    }

    /* Header — JS drag via startDragging() on mousedown */
    .header {
      background: #181825;
      padding: 5px 12px;
      font-weight: 600;
      font-size: 12px;
      color: #b4befe;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
      cursor: grab;
    }

    .content {
      flex: 1;
      padding: 5px 12px 3px;
      overflow-y: auto;
      min-height: 0;
    }

    /* Usage row */
    .usage-row {
      display: flex;
      align-items: center;
      padding: 2px 0;
      gap: 5px;
    }

    .label {
      width: 50px;
      font-size: 10px;
      color: #a6adc8;
      flex-shrink: 0;
    }

    .indicator {
      font-size: 10px;
      flex-shrink: 0;
      width: 14px;
      text-align: center;
    }

    .percent {
      width: 36px;
      text-align: right;
      font-size: 11px;
      font-weight: 500;
      flex-shrink: 0;
    }

    /* CSS color classes */
    .normal  { color: #4caf50; }
    .warning { color: #ff9800; }
    .critical{ color: #f44336; }
    .neutral { color: #a6adc8; }

    /* Progress bar */
    .bar-wrap {
      flex: 1;
      height: 3px;
      background: #313244;
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .bar-fill.normal   { background: #4caf50; }
    .bar-fill.warning  { background: #ff9800; }
    .bar-fill.critical { background: #f44336; }
    .bar-fill.neutral  { background: #6c7086; }

    .reset-time {
      font-size: 9px;
      color: #6c7086;
      flex-shrink: 0;
      white-space: nowrap;
      min-width: 34px;
      text-align: right;
    }

    .meta-row {
      font-size: 10px;
      color: #6c7086;
      text-align: center;
      padding: 3px 0 1px;
    }

    .error-banner {
      font-size: 10px;
      color: #f38ba8;
      background: #2a1520;
      border: 1px solid #5c2233;
      border-radius: 3px;
      padding: 3px 6px;
      margin-bottom: 4px;
      word-break: break-word;
      line-height: 1.3;
    }

    .no-data {
      color: #6c7086;
      text-align: center;
      padding: 10px 0;
      font-size: 11px;
    }

    /* Footer */
    .footer {
      display: flex;
      gap: 6px;
      padding: 4px 12px;
      border-top: 1px solid #313244;
      background: #181825;
      flex-shrink: 0;
    }

    .btn {
      flex: 1;
      padding: 3px 6px;
      border: 1px solid #45475a;
      background: #313244;
      color: #cdd6f4;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
      text-align: center;
      transition: background 0.12s, border-color 0.12s;
    }

    .btn:hover  { background: #45475a; border-color: #585b70; }
    .btn:active { background: #585b70; }
  </style>
</head>
<body>

  <div class="header" id="header">Claude Usage</div>

  <div class="content" id="content">
    <div class="no-data">Loading…</div>
  </div>

  <div class="footer">
    <div class="btn" id="refreshBtn" onclick="onRefresh()">↻ Refresh</div>
    <div class="btn" id="closeBtn" style="display:none" onclick="onClose()">✕ Close</div>
  </div>

  <script>
    // -------------------------------------------------------------------------
    // Tauri API bindings (withGlobalTauri: true)
    // -------------------------------------------------------------------------
    const { invoke } = window.__TAURI__.core;
    const { listen }  = window.__TAURI__.event;

    // Resolve getCurrentWindow() with fallback for older Tauri builds
    const wm  = window.__TAURI__.window;
    const win = (wm.getCurrentWindow || wm.getCurrent).call(wm);

    // -------------------------------------------------------------------------
    // Drag: call startDragging() on mousedown on the header
    // -------------------------------------------------------------------------
    document.getElementById('header').addEventListener('mousedown', (e) => {
      if (e.button === 0) {
        win.startDragging().catch(() => {});
      }
    });

    // -------------------------------------------------------------------------
    // Rendering
    // -------------------------------------------------------------------------

    function levelClass(util, wt, ct) {
      if (util >= ct) return 'critical';
      if (util >= wt) return 'warning';
      return 'normal';
    }

    function indicator(cls) {
      if (cls === 'critical') return '🔴';
      if (cls === 'warning')  return '🟡';
      return '🟢';
    }

    function renderRow(label, w, wt, ct, useColor) {
      if (!w) return '';
      const util  = w.utilization;
      const cls   = useColor ? (w.level || levelClass(util, wt, ct)) : 'neutral';
      const ind   = useColor ? indicator(cls) : '⚪';
      const pct   = util.toFixed(1);
      const barW  = Math.min(100, Math.max(0, util)).toFixed(1);
      const reset = w.resets_in
        ? `<span class="reset-time">${escHtml(w.resets_in)}</span>`
        : '';

      return `
        <div class="usage-row">
          <span class="label">[${label}]</span>
          <span class="indicator">${ind}</span>
          <span class="percent ${cls}">${pct}%</span>
          <div class="bar-wrap"><div class="bar-fill ${cls}" style="width:${barW}%"></div></div>
          ${reset}
        </div>`;
    }

    function renderUsage(data) {
      const wt = data.warning_threshold  ?? 75;
      const ct = data.critical_threshold ?? 90;
      let html  = '';

      if (data.error) {
        html += `<div class="error-banner">⚠ ${escHtml(data.error)}</div>`;
      }

      html += renderRow('5h',     data.five_hour,  wt, ct, true);
      html += renderRow('7d',     data.seven_day,  wt, ct, true);
      html += renderRow('Opus',   data.opus,        wt, ct, false);
      html += renderRow('Sonnet', data.sonnet,      wt, ct, false);

      if (!data.five_hour && !data.seven_day && !data.error) {
        html += '<div class="no-data">Waiting for data…</div>';
      }

      const ts = data.last_checked ? `Last check: ${data.last_checked}` : 'Last check: never';
      html += `<div class="meta-row">${ts}</div>`;

      document.getElementById('content').innerHTML = html;

      // Show Close button only when keep_window_open is enabled
      document.getElementById('closeBtn').style.display =
        data.keep_window_open ? 'block' : 'none';
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // -------------------------------------------------------------------------
    // Button handlers
    // -------------------------------------------------------------------------

    async function onRefresh() {
      try { await invoke('trigger_refresh'); } catch (e) { console.error(e); }
    }

    async function onClose() {
      try { await invoke('hide_popup'); } catch (e) { console.error(e); }
    }

    // -------------------------------------------------------------------------
    // Save position after drag ends
    // -------------------------------------------------------------------------

    window.addEventListener('mouseup', async (e) => {
      if (e.button !== 0) return;
      try {
        const pos = await win.outerPosition();
        await invoke('save_window_position', { x: Math.round(pos.x), y: Math.round(pos.y) });
      } catch (err) {
        console.warn('Could not save window position:', err);
      }
    });

    // -------------------------------------------------------------------------
    // Initialise: fetch data, then subscribe to live updates
    // -------------------------------------------------------------------------

    async function init() {
      try {
        const data = await invoke('get_usage_data');
        renderUsage(data);

        await listen('usage-updated', (event) => {
          renderUsage(event.payload);
        });
      } catch (err) {
        document.getElementById('content').innerHTML =
          `<div class="error-banner">Startup error: ${escHtml(String(err))}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
